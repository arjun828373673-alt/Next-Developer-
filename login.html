  <body>
    <main>
      <h1 class="login-form">
        Login form
      </h1>
      <form class="form-log">
       <div class="email-ent">
         <label for="email">email</label> 
         <input type=email id="email" placeholder="enter your email" required></div>
        <div class="password-ent"> 
        <label for="password">password</label>
         <input type="password" id="password" placeholder="enter your password" required>
        </div>
        <div class="ent-first">
          <label for="first name">first name</label>
          <input type="first name" id="first-name" placeholder="enter your first name" required>
        </div>
        <div class="ent-last">
          <label for="last name">last name</label>
          <input type="last name" id="last-name" placeholder="enter your last name">
        </div>
        <div class="ent-birth">
          <label for="dob">birth date</label>



          
          <input type="date" id="ent-birth" placeholder="enter your birth date" required>
        </div>
        <button type="submit" class=btn-button>Login</button>
      </form>
